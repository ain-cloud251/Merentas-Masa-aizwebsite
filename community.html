<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dinding Komuniti - Merentas Masa</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #0b0b0b; 
            background-image: radial-gradient(rgba(255,255,255,0.05) 15%, transparent 15%),
                              radial-gradient(rgba(255,255,255,0.05) 15%, transparent 15%);
            background-size: 30px 30px;
            background-position: 0 0, 15px 15px; 
            font-family: 'Arial', sans-serif;
            min-height: 100vh;
            padding: 30px;
            color: #ffffff;
            opacity: 0;
            transition: opacity 0.8s ease;
        }

        /* --- BUTANG KEMBALI KE LAMAN UTAMA --- */
        .back-btn {
            position: absolute;
            top: 30px;
            left: 30px;
            background: #ffffff;
            color: #000000;
            padding: 10px 20px;
            border-radius: 20px;
            text-decoration: none;
            font-weight: bold;
            font-size: 0.9rem;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            transition: transform 0.2s, background 0.2s;
            z-index: 10;
        }
        .back-btn:hover {
            transform: scale(1.05);
            background: #e6e6e6;
        }

        /* --- BAHAGIAN UTAMA PAPAN --- */
        .board-container {
            max-width: 1400px; 
            margin: 0 auto;
            text-align: center;
            padding-top: 40px;
        }

        .board-header h1 {
            font-family: 'Georgia', serif;
            font-size: 2.5rem;
            letter-spacing: 1px;
            margin-bottom: 5px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
            text-transform: uppercase;
        }

        .board-header p {
            font-size: 1.1rem;
            color: #999999;
            margin-bottom: 30px;
            font-style: italic;
        }

        /* --- PANEL KAWALAN (INPUT & 4 PILIHAN WARNA) --- */
        .input-panel {
            background: #161616;
            border: 1px solid #333333;
            padding: 20px;
            border-radius: 16px;
            display: inline-flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.4);
            margin-bottom: 40px;
            width: 100%;
            max-width: 550px;
        }

        .color-selector {
            display: flex;
            gap: 12px;
            align-items: center;
            font-family: 'Arial', sans-serif;
            color: #888888;
            font-size: 0.9rem;
        }

        .color-option {
            width: 35px;
            height: 35px;
            cursor: pointer;
            border: 3px solid transparent;
            transition: transform 0.2s, border-color 0.2s;
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
            border-radius: 6px; 
        }
        .color-option:hover {
            transform: scale(1.15);
        }
        .color-option.selected {
            border-color: #ffffff; 
            transform: scale(1.15);
        }

        /* Kod Warna Bulatan Pratinjau (Soft Pastel) */
        .color-pink { background: #ffb7b2; }
        .color-lilac { background: #e8dbfc; }
        .color-salmon { background: #ffdac1; }
        .color-ivory { background: #faf8f2; }

        .input-panel textarea {
            width: 100%;
            height: 80px;
            background: #222222;
            border: 1px solid #333333;
            border-radius: 8px;
            padding: 12px;
            color: #ffffff;
            font-size: 0.95rem;
            resize: none;
            outline: none;
            font-family: 'Arial', sans-serif;
            transition: border-color 0.3s;
        }

        .input-panel textarea:focus {
            border-color: #555555;
        }

        .post-btn {
            background: transparent;
            color: #ffffff;
            border: 1px solid #ffffff;
            padding: 10px 25px;
            font-weight: bold;
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: 'Arial', sans-serif;
        }
        .post-btn:hover {
            background: #ffffff;
            color: #000000;
            transform: translateY(-2px);
        }

        /* --- KAWASAN TAMPALAN NOTA (SANGAT LUAS) --- */
        .notes-wall {
            position: relative;
            width: 100%;
            min-height: 650px; 
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid #222222;
            border-radius: 20px;
            padding: 40px; 
            display: flex;
            flex-wrap: wrap;
            justify-content: flex-start; 
            align-content: flex-start;
            gap: 30px; 
        }

        /* --- REKAAN ASAS NOTA PELEKAT PETAK --- */
        .sticky-note {
            width: 180px; 
            height: 180px;
            padding: 20px;
            font-family: 'Georgia', serif; 
            font-size: 0.95rem;
            font-weight: bold;
            box-shadow: 5px 5px 15px rgba(0,0,0,0.5);
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
            overflow-y: auto;
            word-break: break-word;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            animation: dropIn 0.4s ease-out;
            border-radius: 8px; 
            color: #2a2421 !important; /* Memastikan tulisan sentiasa warna gelap */
            border: 1px solid rgba(0, 0, 0, 0.05);
            cursor: pointer;
        }

        .sticky-note:hover {
            transform: scale(1.1) !important; 
            box-shadow: 10px 10px 20px rgba(0,0,0,0.6);
            z-index: 9;
        }

        @keyframes dropIn {
            0% { transform: scale(0) rotate(0deg); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        /* Kelas CSS Warna Pastel Nota */
        .note-pink { background-color: #ffb7b2 !important; }
        .note-lilac { background-color: #e8dbfc !important; }
        .note-salmon { background-color: #ffdac1 !important; }
        .note-ivory { background-color: #faf8f2 !important; }

        /* --- TETINGKAP POP-UP (MODAL) --- */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(4px);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 9999;
        }

        .modal-box {
            background: #1a1a1a;
            border: 1px solid #333333;
            padding: 30px;
            border-radius: 16px;
            width: 90%;
            max-width: 450px;
            text-align: center;
            box-shadow: 0 15px 40px rgba(0,0,0,0.6);
            animation: fadeInModal 0.3s ease;
        }

        @keyframes fadeInModal {
            from { transform: scale(0.9); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        .modal-box h3 {
            font-family: 'Georgia', serif;
            margin-bottom: 15px;
            font-size: 1.4rem;
        }

        .modal-box textarea {
            width: 100%;
            height: 100px;
            background: #252525;
            border: 1px solid #444444;
            border-radius: 8px;
            padding: 12px;
            color: #ffffff;
            font-size: 1rem;
            resize: none;
            outline: none;
            margin-bottom: 20px;
            font-family: 'Arial', sans-serif;
        }

        .modal-buttons {
            display: flex;
            justify-content: center;
            gap: 15px;
        }

        .modal-btn {
            padding: 10px 20px;
            font-weight: bold;
            border-radius: 25px;
            cursor: pointer;
            border: none;
            transition: all 0.2s;
            font-size: 0.9rem;
        }

        .btn-save {
            background: #2b70e4;
            color: white;
        }
        .btn-save:hover { background: #1a5bc2; }

        .btn-delete {
            background: #b85c5c;
            color: white;
        }
        .btn-delete:hover { background: #9c4444; }

        .btn-cancel {
            background: #444444;
            color: white;
        }
        .btn-cancel:hover { background: #555555; }
    </style>
</head>
<body>

    <a href="#" class="back-btn" onclick="kembaliKeUtama(event)">← Kembali</a>

    <div class="board-container">
        <div class="board-header">
            <h1>Kongsi Fikiran Anda Di Sini</h1>
            <p>Kongsi apa sahaja pandangan atau ucapan anda mengenai koswer sejarah ini secara langsung!</p>
        </div>

        <div class="input-panel">
            <div class="color-selector">
                <span>Pilih Warna Nota:</span>
                <div class="color-option color-pink selected" onclick="pilihWarna('pink', this)"></div>
                <div class="color-option color-lilac" onclick="pilihWarna('lilac', this)"></div>
                <div class="color-option color-salmon" onclick="pilihWarna('salmon', this)"></div>
                <div class="color-option color-ivory" onclick="pilihWarna('ivory', this)"></div>
            </div>
            
            <textarea id="teksNota" placeholder="Taip isi fikiran anda di sini... (Maksimum 60 aksara)" maxlength="60"></textarea>
            <button class="post-btn" onclick="tambahNotaPelekat()">Tampal Nota 📌</button>
        </div>

        <div class="notes-wall" id="dindingNota"></div>
    </div>

    <div class="modal-overlay" id="modalPilihan">
        <div class="modal-box">
            <h3>Ubah Suai Nota Anda</h3>
            <textarea id="teksEditNota" maxlength="60"></textarea>
            <div class="modal-buttons">
                <button class="modal-btn btn-save" onclick="simpanEditNota()">Simpan </button>
                <button class="modal-btn btn-delete" onclick="padamNota()">Padam </button>
                <button class="modal-btn btn-cancel" onclick="tutupModal()">Batal</button>
            </div>
        </div>
    </div>

    <script>
        let warnaDipilih = 'pink';
        let indeksNotaDipilih = null; 

        window.onload = function() {
            document.body.style.opacity = "1";
            paparNotaDahSimpan();
        }

        function kembaliKeUtama(event) {
            event.stopPropagation();
            document.body.style.opacity = "0";
            setTimeout(function() {
                window.location.href = "index.html";
            }, 800);
        }

        function pilihWarna(warna, elemen) {
            document.querySelectorAll('.color-option').forEach(pilihan => {
                pilihan.classList.remove('selected');
            });
            elemen.classList.add('selected');
            warnaDipilih = warna;
        }

        // Fungsi mencetak nota ke dalam HTML
        function ciptaElemenNota(mesej, warna, putaran, indeks) {
            const notaBaru = document.createElement('div');
            notaBaru.className = `sticky-note note-${warna}`;
            notaBaru.style.transform = `rotate(${putaran}deg)`;
            notaBaru.innerText = mesej;
            
            notaBaru.onclick = function() {
                bukaModal(indeks, mesej);
            };

            return notaBaru;
        }

        // Fungsi utama tambah nota oleh pengguna
        function tambahNotaPelekat() {
            const inputTeks = document.getElementById('teksNota');
            const mesej = inputTeks.value.trim();

            if (mesej === '') {
                alert('Sila taip sesuatu dahulu sebelum menampal!');
                return;
            }

            const putaranRawak = Math.floor(Math.random() * 10) - 5; 

            simpanNotaKeStorage(mesej, warnaDipilih, putaranRawak);
            paparNotaDahSimpan();

            inputTeks.value = '';
        }

        function simpanNotaKeStorage(mesej, warna, putaran) {
            let senaraiNota = localStorage.getItem('notaKomuniti') ? JSON.parse(localStorage.getItem('notaKomuniti')) : [];
            senaraiNota.unshift({ mesej: mesej, warna: warna, putaran: putaran });
            localStorage.setItem('notaKomuniti', JSON.stringify(senaraiNota));
        }

        // Fungsi memanggil semula data yang tersimpan
        function paparNotaDahSimpan() {
            const dinding = document.getElementById('dindingNota');
            let senaraiNota = localStorage.getItem('notaKomuniti') ? JSON.parse(localStorage.getItem('notaKomuniti')) : [];

            // Memaksa set semula nota lalai jika tiada nota tersimpan langsung dalam storan
            if (senaraiNota.length === 0) {
                senaraiNota = [
                    { mesej: "Terbaiklah Koswer Ni! ♡", warna: "pink", putaran: -3 },
                    { mesej: "Kumpulan 22 Terbaik!!", warna: "lilac", putaran: 4 },
                    { mesej: "Sejarah Itu Warisan Kita :)", warna: "salmon", putaran: -2 },
                    { mesej: "Syabas UiTM!!!", warna: "ivory", putaran: 3 }
                ];
                localStorage.setItem('notaKomuniti', JSON.stringify(senaraiNota));
            }

            dinding.innerHTML = '';
            senaraiNota.forEach((nota, indeks) => {
                const elemenNota = ciptaElemenNota(nota.mesej, nota.warna, nota.putaran, indeks);
                dinding.appendChild(elemenNota); 
            });
        }

        /* --- LOGIK INTERAKTIF POP-UP (EDIT & DELETE) --- */
        function bukaModal(indeks, mesej) {
            indeksNotaDipilih = indeks;
            document.getElementById('teksEditNota').value = mesej;
            document.getElementById('modalPilihan').style.display = 'flex';
        }

        function tutupModal() {
            document.getElementById('modalPilihan').style.display = 'none';
            indeksNotaDipilih = null;
        }

        function simpanEditNota() {
            const teksBaru = document.getElementById('teksEditNota').value.trim();
            if (teksBaru === '') {
                alert('Teks nota tidak boleh dibiarkan kosong!');
                return;
            }

            let senaraiNota = JSON.parse(localStorage.getItem('notaKomuniti'));
            senaraiNota[indeksNotaDipilih].mesej = teksBaru;
            
            localStorage.setItem('notaKomuniti', JSON.stringify(senaraiNota));
            paparNotaDahSimpan(); 
            tutupModal();
        }

        function padamNota() {
            if (confirm('Adakah anda pasti mahu memadam nota ini?')) {
                let senaraiNota = JSON.parse(localStorage.getItem('notaKomuniti'));
                senaraiNota.splice(indeksNotaDipilih, 1);
                
                localStorage.setItem('notaKomuniti', JSON.stringify(senaraiNota));
                paparNotaDahSimpan(); 
                tutupModal();
            }
        }
    </script>

</body>
</html>
